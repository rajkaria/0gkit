name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: lint · typecheck · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm format:check

      # core is the shared base — its type declarations must exist before
      # dependents' DTS builds.
      - run: pnpm --filter @foundryprotocol/0gkit-core build

      - run: pnpm build

      - run: pnpm lint

      - run: pnpm boundary:check

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm test:scripts

      - run: pnpm docs:check

      - run: pnpm templates:check

      # Playground golden-path smoke: console renders, attestation verify runs
      # live in-browser, copy-code works for all four forms.
      - run: pnpm --filter @foundryprotocol/0gkit-playground exec playwright install --with-deps chromium

      - run: pnpm --filter @foundryprotocol/0gkit-playground exec playwright test

  create-0gkit-app-e2e:
    name: create-0gkit-app · scaffolds a project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # create-0gkit-app re-exports create-0g-app's source, which imports the
      # kits engine — its type declarations must exist before the DTS build.
      - run: pnpm --filter @foundryprotocol/0gkit-kits build

      - run: pnpm --filter create-0gkit-app build

      # Smoke the binary: should write package.json + .env.example into a
      # fresh tmpdir, exit 0, with --no-install / --no-git for speed. The
      # package default pins templates to a release tag, but PR runs need
      # to fetch against the branch's current SHA — the tag for this
      # change hasn't been published yet.
      - name: Scaffold storage-app (local network, no install)
        env:
          OGKIT_TEMPLATE_REF: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          WORK=$(mktemp -d)
          cd "$WORK"
          node "$GITHUB_WORKSPACE/packages/create-0gkit-app/dist/bin.js" demo \
            --template storage-app --network local --no-install --no-git
          test -f demo/package.json
          test -f demo/.env.example
          grep -q '^NETWORK=local$' demo/.env.example
